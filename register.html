<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Finance Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: hsl(var(--muted) / 0.5);
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .error-msg {
            color: hsl(var(--destructive));
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card login-card animate-fade-in">
        <div style="display: flex; justify-content: flex-end; padding-bottom: 0;">
            <button id="themeToggle" aria-label="Toggle dark mode">
                <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="display:none">
                    <circle cx="12" cy="12" r="4" />
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
                </svg>

                <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                </svg>
                <span id="themeLabel">Dark Mode</span>
            </button>
        </div>
        <div class="card-header pb-6 px-0 pt-0 text-center">
            <h1 class="text-2xl font-bold tracking-tight mb-2">Create an Account</h1>
            <p class="text-sm text-muted-foreground">Sign up to start tracking your finances.</p>
        </div>
        <div class="card-content p-0">
            <form id="registerForm" class="space-y-4">
                <div class="space-y-2">
                    <label for="username" class="text-sm font-medium leading-none">Email</label>
                    <input type="email" id="username" class="input w-full" placeholder="you@example.com" required>
                </div>
                <div class="space-y-2 mt-4">
                    <label for="password" class="text-sm font-medium leading-none">Password</label>
                    <input type="password" id="password" class="input w-full" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div id="errorMsg" class="error-msg"></div>
                <button type="submit" class="btn btn-primary w-full mt-6">Sign Up</button>
            </form>
            <div class="mt-6 text-center text-sm">
                <span class="text-muted-foreground">Already have an account?</span> 
                <a href="login.html" class="font-medium hover:underline" style="color: hsl(var(--primary))">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="register.js"></script>
    <script>
        // Apply theme immediately to prevent flash
        const saved = localStorage.getItem('finance_theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved ? saved === 'dark' : prefersDark) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
